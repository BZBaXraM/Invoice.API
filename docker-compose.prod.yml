# Production compose for the EC2 host. Differences from docker-compose.yml:
# images are pulled from GHCR instead of built, Postgres is not exposed to the
# host, the API serves plain HTTP internally, and Caddy is the single public
# entry point (80/443) terminating TLS via Let's Encrypt for ${DOMAIN} and
# routing /api + /hubs to the API and everything else to the client.
#
# Deployed to /opt/invoice by .github/workflows/deploy.yml alongside
# deploy/Caddyfile. Expects /opt/invoice/.env — see DEPLOY.md.

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-InvoiceDb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/bzbaxram/invoice-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-InvoiceDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      JWT__Secret: ${JWT_SECRET:?set JWT_SECRET in .env}
      # Client and API are same-origin behind Caddy, so CORS is only a
      # fallback here; kept pointing at the public origin for safety.
      Cors__AllowedOrigins__0: "https://${DOMAIN:?set DOMAIN in .env}"
      EmailConfig__From: ${EMAIL_FROM:-4211ru@gmail.com}
      EmailConfig__SmtpServer: ${EMAIL_SMTP_SERVER:-smtp.gmail.com}
      EmailConfig__Port: ${EMAIL_PORT:-587}
      EmailConfig__UserName: ${EMAIL_USERNAME:?set EMAIL_USERNAME in .env}
      EmailConfig__Password: ${EMAIL_PASSWORD:?set EMAIL_PASSWORD in .env}
      Groq__ApiKey: ${GROQ_API_KEY:?set GROQ_API_KEY in .env}
      Groq__Model: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      Groq__BaseUrl: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1/}
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: ghcr.io/bzbaxram/invoice-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - client

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
