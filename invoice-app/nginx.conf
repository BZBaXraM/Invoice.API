server {
    listen 80;
#     listen 443 ssl;
    server_name _;

#     ssl_certificate     /etc/nginx/certs/localhost-cert.pem;
#     ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Prerendered routes (login, register, confirm-email, forgot-password,
    # reset-password) ship as <route>/index.html with asset URLs relative to
    # "/" (no leading slash) — serve the file directly at the extensionless
    # path rather than redirecting to a trailing slash, which would resolve
    # those relative assets against the wrong base and 404 them.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
