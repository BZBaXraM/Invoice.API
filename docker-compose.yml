services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: InvoiceDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Invoice.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Username=postgres;Password=root;Database=InvoiceDb"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7030:8080"

  client:
    build:
      context: invoice-app
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres-data:
