services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-InvoiceDb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Invoice.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-InvoiceDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      JWT__Secret: ${JWT_SECRET:?set JWT_SECRET in .env}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN:-http://localhost:4200}
      EmailConfig__From: ${EMAIL_FROM:-4211ru@gmail.com}
      EmailConfig__SmtpServer: ${EMAIL_SMTP_SERVER:-smtp.gmail.com}
      EmailConfig__Port: ${EMAIL_PORT:-587}
      EmailConfig__UserName: ${EMAIL_USERNAME:?set EMAIL_USERNAME in .env}
      EmailConfig__Password: ${EMAIL_PASSWORD:?set EMAIL_PASSWORD in .env}
      AdminSeed__Email: ${ADMIN_SEED_EMAIL:-admin@invoice.com}
      AdminSeed__Password: ${ADMIN_SEED_PASSWORD:-admin202210BK}
      Groq__ApiKey: ${GROQ_API_KEY:?set GROQ_API_KEY in .env}
      Groq__Model: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      Groq__BaseUrl: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1/}
      ASPNETCORE_URLS: "https://+:8081;http://+:8080"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "123"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
    volumes:
      - ${HOME}/.aspnet/https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "7030:8081"

  client:
    build:
      context: invoice-app
      dockerfile: Dockerfile
    depends_on:
      - api
#    volumes:
#      - ./invoice-app/.cert:/etc/nginx/certs:ro
    ports:
      - "4200:80"
#      - "8081:80"

volumes:
  postgres_data:
