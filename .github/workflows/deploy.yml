name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; a second push waits for the first to finish.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  API_IMAGE: ghcr.io/bzbaxram/invoice-api
  CLIENT_IMAGE: ghcr.io/bzbaxram/invoice-client

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Invoice.API/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: invoice-app
          push: true
          # Baked into environment.ts at build time (see invoice-app/Dockerfile).
          # In production the API is same-origin behind Caddy, under /api.
          build-args: |
            API_URL=https://${{ vars.DOMAIN }}/api
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file and Caddyfile to the server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/Caddyfile"
          target: /opt/invoice

      - name: Pull new images and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/invoice
            # GITHUB_TOKEN is valid for GHCR pulls for the duration of this job,
            # so the server needs no long-lived registry credentials.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
